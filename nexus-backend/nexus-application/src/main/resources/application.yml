spring:
  application:
    name: project-nexus

  datasource:
    url: jdbc:postgresql://localhost:5432/nexus
    username: ${DB_USERNAME:nexus}
    password: ${DB_PASSWORD:nexus}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: 8080

nexus:
  security:
    jwt:
      secret: ${JWT_SECRET:default-dev-secret-key-change-in-production-min-32-chars}
      expiration-hours: ${JWT_EXPIRATION_HOURS:24}

logging:
  level:
    com.projectnexus: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
